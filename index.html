t-item .dot.off{background:var(--grey)}.list-item .ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0}.list-item .ava img{width:100%;height:100%;object-fit:cover}.list-item .info{flex:1;min-width:0}.list-item .name{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.list-item .actions{display:flex;gap:4px;flex-shrink:0}.list-item .actions button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;border-radius:3px}.list-item .actions button:hover{background:var(--d5);color:#fff}.user-bar{padding:8px;border-top:1px solid rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;background:#232428;cursor:pointer}.user-bar:hover{background:var(--d5)}.user-bar .ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0}.user-bar .ava img{width:100%;height:100%;object-fit:cover}.user-bar .name{flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.chat-area{flex:1;display:flex;flex-direction:column;background:var(--d3);min-width:0}.chat-hdr{height:48px;border-bottom:2px solid var(--d2);padding:0 16px;display:flex;align-items:center;font-weight:600;color:var(--hdr);gap:12px}.msg-container{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px;scroll-behavior:smooth}.msg-container::-webkit-scrollbar{width:6px}.msg-container::-webkit-scrollbar-thumb{background:var(--d4);border-radius:3px}.msg-row{display:flex;gap:12px;padding:4px 0}.msg-row .ma{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;overflow:hidden;cursor:pointer}.msg-row .ma img{width:100%;height:100%;object-fit:cover}.msg-row .mc{flex:1;min-width:0}.msg-row .mh{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}.msg-row .mh .author{font-weight:600;font-size:14px}.msg-row .mh .time{font-size:11px;color:var(--muted)}.msg-row .mt{color:var(--txt);font-size:14px;line-height:1.4;word-wrap:break-word}.m-system{text-align:center;color:var(--muted);font-size:13px;padding:24px}.welcome-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--muted)}.welcome-screen .big-icon{font-size:64px}.welcome-screen h2{color:var(--hdr);font-size:20px;font-weight:600}.welcome-screen p{font-size:14px;text-align:center;max-width:300px}.input-area{padding:0 16px 24px}.input-row{background:var(--d4);border-radius:8px;padding:0 16px;display:flex;align-items:center;gap:4px}.input-row textarea{flex:1;background:0 0;border:none;outline:none;resize:none;color:var(--txt);font-size:14px;font-family:inherit;padding:10px 0;line-height:1.2;max-height:100px}.input-row textarea::placeholder{color:var(--muted)}.icon-btn{background:0 0;border:none;color:var(--muted);cursor:pointer;font-size:20px;padding:6px;border-radius:4px}.icon-btn:hover{background:var(--d5);color:#fff}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:3000;backdrop-filter:blur(4px)}.modal{background:var(--d2);border-radius:8px;padding:24px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 50px rgba(0,0,0,.6);display:flex;flex-direction:column;gap:12px}.modal h3{color:#fff;font-size:18px;font-weight:600}.modal label{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase}.modal input,.modal textarea{background:var(--d4);border:1px solid var(--d5);border-radius:4px;padding:10px;color:#fff;font-size:14px;outline:none;font-family:inherit;resize:vertical}.modal input:focus,.modal textarea:focus{border-color:var(--blurple)}.btn-row{display:flex;gap:8px;flex-wrap:wrap}.btn{padding:8px 14px;border-radius:4px;border:none;cursor:pointer;font-size:13px;font-weight:500;background:var(--d4);color:#fff;text-align:center}.btn:hover{background:var(--d5)}.btn.primary{background:var(--blurple)}.btn.primary:hover{background:var(--blurple-hover)}.btn.success{background:var(--green)}.btn.success:hover{background:#1a8a47}.btn.danger{background:var(--danger)}.btn.danger:hover{background:#d93438}.btn.small{padding:3px 8px;font-size:11px}.empty-state{text-align:center;color:var(--muted);padding:24px;font-size:13px}@media(max-width:700px){.main-panel{width:200px;min-width:200px}}</style>

<body>

<div id="auth-overlay" class="auth-overlay"><div class="auth-box">
<h1>☁️ <span>Skycord</span></h1>
<input type="text" id="auth-nickname" class="auth-input" placeholder="Никнейм" maxlength="30" autocomplete="off">

</div></div>

<div id="app-layout" class="app-layout">
<nav class="sidebar" id="sidebar">
<div class="icon home active" data-view="home" title="Главная">☁️</div>
<div class="sep"></div>
<div class="icon add" id="create-server-btn" title="Создать сервер">+</div>
<div class="icon" id="browse-servers-btn" title="Все серверы" style="font-size:16px">🔍</div>
<div id="server-icons"></div>
</nav>

<aside class="main-panel" id="main-panel">
<div class="panel-hdr" id="panel-header"><span id="panel-title">Друзья</span></div>
<div class="friend-search" id="friend-search-box">
<input type="text" id="add-friend-input" placeholder="Никнейм друга...">
<div class="btn-row"><button class="btn primary" id="add-friend-btn">Добавить</button></div>
</div>
<div class="sec-label" id="section-label">ДРУЗЬЯ</div>
<div class="panel-list" id="panel-list"><div class="empty-state">Загрузка...</div></div>
<div class="user-bar" id="profile-btn">
<div class="ava" id="ua-current">?</div>
<div class="name" id="un-current">Гость</div>
<button class="icon-btn" id="logout-btn" title="Выйти">⏻</button>
</div>
</aside>

<main class="chat-area" id="chat-area">
<div id="chat-content" style="flex:1;display:flex;flex-direction:column">
<div class="welcome-screen" id="welcome-screen"><div class="big-icon">👥</div><h2>Добро пожаловать в Skycord</h2><p>Выбери друга слева или сервер, чтобы начать общение</p></div>
<div class="chat-hdr" id="chat-header" style="display:none"><span id="chat-title"></span></div>
<div class="msg-container" id="msg-container" style="display:none"></div>
<div class="input-area" id="input-area" style="display:none"><div class="input-row"><textarea id="chat-input" placeholder="Напишите сообщение..." rows="1"></textarea><button class="icon-btn" id="send-btn">➤</button></div></div>
</div>
</main>
</div>
<div id="modal-container"></div>

<script>
(function(){'use strict';
var _c={a:"AIzaSyAk7LKFocyEzjBI8oWkaZNBIfoFTV1mI_c",b:"skycord-ec8c1.firebaseapp.com",c:"skycord-ec8c1",d:"skycord-ec8c1.firebasestorage.app",e:"842442031046",f:"1:842442031046:web:62f44d0f3057e8e6c33cc7",g:"G-RW0KCN3FBK",h:"https://skycord-ec8c1-default-rtdb.firebaseio.com"};
firebase.initializeApp({apiKey:_c.a,authDomain:_c.b,projectId:_c.c,storageBucket:_c.d,messagingSenderId:_c.e,appId:_c.f,measurementId:_c.g,databaseURL:_c.h});var db=firebase.database();
var U=null,currentChat=null,currentServer=null,mRef=null,pRef=null,sList=null,frList=null,friendsData={};
var uColors={},uAvatars={},SALT='skycord_salt_';

function sha256(m){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(m)).then(function(d){return Array.from(new Uint8Array(d)).map(function(b){return b.toString(16).padStart(2,'0')}).join('')})}
function genColor(n){if(uColors[n])return uColors[n];var h=0;for(var i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);var c='hsl('+(Math.abs(h)%360)+',60%,45%)';uColors[n]=c;return c}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmt(t){return esc(t).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code style="background:var(--d1);padding:2px 5px;border-radius:3px">$1</code>')}
function timeStr(ts){var d=ts?new Date(ts):new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function san(n){return n.replace(/[^a-zA-Z0-9\u0400-\u04FF_\-]/g,'').trim().toLowerCase()}
function gid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,8)}
function modal(t,b,btns){return new Promise(function(r){var o=document.createElement('div');o.className='modal-overlay';o.innerHTML='<div class="modal"><h3>'+t+'</h3>'+b+'<div class="btn-row">'+btns.map(function(x){return'<button class="btn '+(x.cls||'')+'" data-action="'+x.action+'">'+x.text+'</button>'}).join('')+'</div></div>';o.addEventListener('click',function(e){if(e.target===o){o.remove();r(null)}});o.querySelectorAll('.btn').forEach(function(bn){bn.addEventListener('click',function(){var v={};o.querySelectorAll('input,textarea').forEach(function(i){v[i.id||i.placeholder]=i.value});o.remove();r({action:bn.dataset.action,values:v})})});document.body.appendChild(o);setTimeout(function(){var fi=o.querySelector('input');if(fi)fi.focus()},100)})}
function saveS(n){sessionStorage.setItem('skysess',JSON.stringify({n:n,t:Date.now()}))}
function getS(){try{return JSON.parse(sessionStorage.getItem('skysess'))}catch(e){return null}}
function clearS(){sessionStorage.removeItem('skysess')}

var d={};
function bindDom(){
d.ao=document.getElementById('auth-overlay');d.al=document.getElementById('app-layout');
d.an=document.getElementById('auth-nickname');d.ap=document.getElementById('auth-password');
d.ae=document.getElementById('auth-error');d.ab=document.getElementById('auth-submit-btn');
d.at=document.getElementById('auth-toggle');d.un=document.getElementById('un-current');
d.ua=document.getElementById('ua-current');d.pt=document.getElementById('panel-title');
d.pl=document.getElementById('panel-list');d.ws=document.getElementById('welcome-screen');
d.ch=document.getElementById('chat-header');d.ct=document.getElementById('chat-title');
d.mc=document.getElementById('msg-container');d.inp=document.getElementById('input-area');
d.ci=document.getElementById('chat-input');d.sbb=document.getElementById('send-btn');
d.sb=document.getElementById('sidebar');d.si=document.getElementById('server-icons');
d.sl=document.getElementById('section-label');d.fs=document.getElementById('friend-search-box');
d.pf=document.getElementById('profile-btn');d.lb=document.getElementById('logout-btn');
d.af=document.getElementById('add-friend-input');d.afb=document.getElementById('add-friend-btn');
d.csb=document.getElementById('create-server-btn');d.bsb=document.getElementById('browse-servers-btn');
}
var regMode=false;

function upAuthUI(){d.ab.textContent=regMode?'Зарегистрироваться':'Войти';d.at.innerHTML=regMode?'Уже есть аккаунт? <span>Войти</span>':'Нет аккаунта? <span>Зарегистрироваться</span>';d.ae.textContent='';d.ab.disabled=false}

function handleAuth(){
var r=d.an.value.trim(),p=d.ap.value.trim();
if(!r||!p){d.ae.textContent='Заполните все поля';return}
var n=san(r);
if(n.length<2){d.ae.textContent='Никнейм: минимум 2 символа';return}
if(p.length<4){d.ae.textContent='Пароль: минимум 4 символа';return}
d.ab.disabled=true;d.ae.textContent='';
db.ref('users/'+n).once('value').then(function(snap){
var data=snap.val();
if(regMode){
if(data){d.ae.textContent='Никнейм занят';d.ab.disabled=false;return}
sha256(p+SALT+n).then(function(hash){
db.ref('users/'+n).set({nickname:n,pw:hash,color:genColor(n),avatar:'',bio:'',status:'online',createdAt:firebase.database.ServerValue.TIMESTAMP}).then(function(){login(n)}).catch(function(e){d.ae.textContent='Ошибка записи';d.ab.disabled=false});
});
}else{
if(!data){d.ae.textContent='Пользователь не найден';d.ab.disabled=false;return}
var storedHash=data.pw||data.passwordHash||'';
if(!storedHash){d.ae.textContent='Аккаунт повреждён';d.ab.disabled=false;return}
sha256(p+SALT+n).then(function(hash){
if(storedHash!==hash){d.ae.textContent='Неверный пароль';d.ab.disabled=false;return}
login(n);
});
}
}).catch(function(e){d.ae.textContent='Ошибка соединения';d.ab.disabled=false;console.error(e)});
}

function login(n){U={nickname:n,color:genColor(n)};saveS(n);d.ao.classList.add('hidden');d.al.classList.add('active');d.an.value='';d.ap.value='';updateMyUI();setupPresence();loadFriendsList();loadServers();showFriendsView()}
function logout(){if(pRef){pRef.onDisconnect().cancel();pRef.remove();pRef=null}detachAll();U=null;clearS();d.al.classList.remove('active');d.ao.classList.remove('hidden');d.ab.disabled=false;d.ab.textContent='Войти'}
function updateMyUI(){if(!U)return;d.un.textContent=U.nickname;db.ref('users/'+U.nickname).once('value').then(function(s){var dd=s.val();if(dd){U.color=dd.color||U.color;U.avatar=dd.avatar;uAvatars[U.nickname]=dd.avatar;if(dd.avatar)d.ua.innerHTML='<img src="'+dd.avatar+'" alt="">';else{d.ua.innerHTML=U.nickname[0].toUpperCase();d.ua.style.background=U.color}}})}
function setupPresence(){if(!U)return;if(pRef){pRef.onDisconnect().cancel();pRef.remove()}pRef=db.ref('presence/'+U.nickname);pRef.set({nickname:U.nickname,color:U.color,avatar:U.avatar||'',lastSeen:firebase.database.ServerValue.TIMESTAMP});pRef.onDisconnect().remove()}

// ============ СЕРВЕРЫ ============
function loadServers(){
if(sList)db.ref('servers').off('value',sList);
sList=db.ref('servers').on('value',function(s){
var servers=s.val();var html='';
if(servers){Object.entries(servers).forEach(function(e){if(e[1].members&&U&&e[1].members[U.nickname])html+='<div class="icon'+(currentServer===e[0]?' active':'')+'" data-server="'+e[0]+'" title="'+esc(e[1].name)+'">'+(e[1].icon||e[1].name[0].toUpperCase())+'</div>'})}
d.si.innerHTML=html;
d.si.querySelectorAll('.icon').forEach(function(el){el.addEventListener('click',function(){openServer(el.dataset.server)})});
});
}

function openServer(sid){
currentServer=sid;currentChat=null;
showChatArea();
d.ct.textContent='Загрузка...';
d.pt.textContent='Сервер';
d.sl.textContent='КАНАЛЫ';
d.fs.style.display='none';
d.pl.innerHTML='<div class="empty-state">Загрузка...</div>';
d.sb.querySelectorAll('.icon').forEach(function(el){el.classList.remove('active')});
d.sb.querySelector('.icon.home').classList.remove('active');
var activeIcon=d.si.querySelector('[data-server="'+sid+'"]');if(activeIcon)activeIcon.classList.add('active');
db.ref('servers/'+sid).once('value').then(function(s){
var data=s.val();if(!data)return;
d.pt.textContent=data.name;
d.ct.textContent='# '+data.name;
var chs=data.channels||{};
var html='';
Object.entries(chs).forEach(function(e){html+='<div class="list-item" data-sch="'+e[0]+'" data-sname="'+esc(e[1].name)+'"># '+esc(e[1].name)+'</div>'});
d.pl.innerHTML=html;
d.pl.querySelectorAll('.list-item[data-sch]').forEach(function(el){el.addEventListener('click',function(){openServerChannel(sid,el.dataset.sch,el.dataset.sname)})});
var fc=Object.keys(chs)[0];
if(fc)openServerChannel(sid,fc,chs[fc].name);
});
}

function openServerChannel(sid,chid,chname){
currentServer=sid;currentChat=chid;
showChatArea();
d.ct.textContent='# '+chname;
d.pl.querySelectorAll('.list-item').forEach(function(el){el.classList.remove('active')});
var activeEl=d.pl.querySelector('[data-sch="'+chid+'"]');if(activeEl)activeEl.classList.add('active');
attachMsgs();
}

// ============ ДРУЗЬЯ ============
function showFriendsView(){
currentServer=null;currentChat=null;
showWelcome();
d.pt.textContent='Друзья';d.sl.textContent='ДРУЗЬЯ';d.fs.style.display='block';
d.sb.querySelectorAll('.icon').forEach(function(el){el.classList.remove('active')});
d.sb.querySelector('.icon.home').classList.add('active');

}

function showChatArea(){
d.ws.style.display='none';d.ch.style.display='flex';d.mc.style.display='block';d.inp.style.display='block';
}

function loadFriendsList(){
if(frList)db.ref('friends/'+U.nickname).off('value',frList);
frList=db.ref('friends/'+U.nickname).on('value',function(s){friendsData=s.val()||{};renderFriendsPanel()});
d.afb.addEventListener('click',addFriend);
d.af.addEventListener('keydown',function(e){if(e.key==='Enter')addFriend()});
}

function addFriend(){var t=san(d.af.value.trim());if(!t)return;if(t===U.nickname){alert('Нельзя');return}if(friendsData[t]){alert('Уже в друзьях');return}db.ref('friendRequests/'+t+'/'+U.nickname).set({from:U.nickname,timestamp:firebase.database.ServerValue.TIMESTAMP});d.af.value='';alert('Заявка отправлена пользователю '+t)}

function renderFriendsPanel(){
if(currentServer)return;
var el=d.pl;if(!el)return;
var keys=Object.keys(friendsData);
if(keys.length===0){el.innerHTML='<div class="empty-state">Нет друзей.<br>Добавь друга по никнейму выше ↑</div>';return}
var html='';
keys.forEach(function(f){var av=uAvatars[f]||'';var avHTML=av?'<img src="'+av+'" alt="">':f[0].toUpperCase();html+='<div class="list-item'+(currentChat===f?' active':'')+'" data-user="'+f+'"><div class="ava" style="background:'+genColor(f)+'">'+avHTML+'</div><div class="info"><div class="name">'+esc(f)+'</div></div><div class="actions"><button data-remove="'+f+'" title="Удалить">✕</button></div></div>'});
el.innerHTML=html;
el.querySelectorAll('.list-item[data-user]').forEach(function(li){li.addEventListener('click',function(e){if(e.target.tagName==='BUTTON')return;openFriendChat(li.dataset.user)})});
el.querySelectorAll('[data-remove]').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();db.ref('friends/'+U.nickname+'/'+b.dataset.remove).remove();db.ref('friends/'+b.dataset.remove+'/'+U.nickname).remove()})});
}

function openFriendChat(nickname){
currentServer=null;currentChat=nickname;
showChatArea();
d.ct.textContent='💬 '+esc(nickname);
d.pt.textContent='ЛС';d.sl.textContent='ДРУЗЬЯ';d.fs.style.display='block';
d.sb.querySelectorAll('.icon').forEach(function(el){el.classList.remove('active')});
d.sb.querySelector('.icon.home').classList.add('active');
renderFriendsPanel();
attachMsgs();
}

// ============ СООБЩЕНИЯ ============
function msgPath(){
if(currentServer&&currentChat)return'messages/'+currentServer+'/'+currentChat;
var ids=[U.nickname,currentChat].sort();return'messages/dm/'+ids.join('_');
}
function attachMsgs(){
if(mRef)mRef.off('value');
if(currentServer&&currentChat){}else if(currentChat){var ids=[U.nickname,currentChat].sort();var dmId=ids.join('_');db.ref('dm/'+dmId).once('value').then(function(s){if(!s.val()){var u={};u[U.nickname]=true;u[currentChat]=true;db.ref('dm/'+dmId).set({users:u})}})}
mRef=db.ref(msgPath());mRef.limitToLast(50).on('value',function(s){var ms=s.val();d.mc.innerHTML='';if(!ms){d.mc.innerHTML='<div class="m-system">Нет сообщений</div>';return}var frag=document.createDocumentFragment();Object.entries(ms).forEach(function(e){frag.appendChild(buildMsg(e[1]))});d.mc.appendChild(frag);d.mc.scrollTop=d.mc.scrollHeight});
}
function buildMsg(m){var row=document.createElement('div');row.className='msg-row';var c=m.color||genColor(m.nickname||'?');var av=uAvatars[m.nickname]||'';var avHTML=av?'<img src="'+av+'" alt="">':(m.nickname||'?')[0].toUpperCase();row.innerHTML='<div class="ma" style="background:'+c+'">'+avHTML+'</div><div class="mc"><div class="mh"><span class="author" style="color:'+c+'">'+esc(m.nickname||'?')+'</span><span class="time">'+timeStr(m.timestamp)+'</span></div><div class="mt">'+fmt(m.text||'')+'</div></div>';return row}
function sendMsg(){var t=d.ci.value.trim();if(!t||!U)return;if(!currentChat&&!currentServer)return;db.ref(msgPath()).push({nickname:U.nickname,color:U.color,text:t,timestamp:firebase.database.ServerValue.TIMESTAMP});d.ci.value='';d.ci.style.height='auto'}
function detachAll(){if(mRef){mRef.off('value');mRef=null}if(sList){db.ref('servers').off('value',sList);sList=null}if(frList&&U){db.ref('friends/'+U.nickname).off('value',frList);frList=null}}

// ============ ПРОФИЛЬ ============
function openProfileModal(){db.ref('users/'+U.nickname).once('value').then(function(s){var dd=s.val()||{};var avHTML=dd.avatar?'<img src="'+dd.avatar+'" alt="">':U.nickname[0].toUpperCase();modal('Профиль','<div class="ava" style="background:'+(dd.color||U.color)+';width:80px;height:80px;font-size:32px;align-self:center" id="pf-av">'+avHTML+'</div><button class="btn" id="ch-av" style="margin-top:-8px">📷 Сменить аватар</button><label>Статус</label><input id="pf-st" value="'+esc(dd.status||'')+'" maxlength="50"><label>О себе</label><textarea id="pf-bio" maxlength="200">'+esc(dd.bio||'')+'</textarea>',[{text:'Отмена',action:'c'},{text:'Сохранить',action:'ok',cls:'primary'}]).then(function(r){if(!r||r.action!=='ok')return;db.ref('users/'+U.nickname).update({status:r.values['pf-st']||'',bio:r.values['pf-bio']||''});updateMyUI()})})}
function uploadAvatar(){return new Promise(function(r){var i=document.createElement('input');i.type='file';i.accept='image/*';i.onchange=function(){var f=i.files[0];if(!f)return r(null);if(f.size>500*1024){alert('Макс 500КБ');return r(null)}var rd=new FileReader();rd.onload=function(e){var img=new Image();img.onload=function(){var c=document.createElement('canvas');var s=Math.min(img.width,img.height,128);c.width=s;c.height=s;var ctx=c.getContext('2d');ctx.drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,s,s);r(c.toDataURL('image/jpeg',0.7))};img.src=e.target.result};rd.readAsDataURL(f)};i.click()})}
document.addEventListener('click',function(e){if(e.target.id==='ch-av'){uploadAvatar().then(function(av){if(av){db.ref('users/'+U.nickname).update({avatar:av});uAvatars[U.nickname]=av;var pv=document.getElementById('pf-av');if(pv)pv.innerHTML='<img src="'+av+'" alt="">';updateMyUI()}})}});

// ============ СОБЫТИЯ ============
function bindEvents(){
d.ab.addEventListener('click',handleAuth);
d.ap.addEventListener('keydown',function(e){if(e.key==='Enter')handleAuth()});
d.at.addEventListener('click',function(){regMode=!regMode;upAuthUI()});
d.lb.addEventListener('click',logout);
d.pf.addEventListener('click',openProfileModal);
d.sbb.addEventListener('click',sendMsg);
d.ci.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
d.ci.addEventListener('input',function(){d.ci.style.height='auto';d.ci.style.height=Math.min(d.ci.scrollHeight,100)+'px'});
d.sb.querySelector('.icon[data-view="home"]').addEventListener('click',showFriendsView);
d.csb.addEventListener('click',function(){modal('Создать сервер','<label>Название</label><input id="sn" maxlength="30"><label>Иконка (эмодзи)</label><input id="si" maxlength="4">',[{text:'Отмена',action:'c'},{text:'Создать',action:'ok',cls:'primary'}]).then(function(r){if(!r||r.action!=='ok')return;var nm=r.values.sn||'Сервер',ic=r.values.si||'💬',sid=gid(),m={};m[U.nickname]=true;db.ref('servers/'+sid).set({name:nm,icon:ic,owner:U.nickname,members:m,channels:{general:{name:'общий',type:'text'}}});openServer(sid)})});
d.bsb.addEventListener('click',function(){db.ref('servers').once('value').then(function(s){var servers=s.val()||{};var html='';Object.entries(servers).forEach(function(e){var isM=e[1].members&&U&&e[1].members[U.nickname];html+='<div class="list-item" data-bjoin="'+e[0]+'" style="'+('border-bottom:1px solid var(--d5)')+'"><div class="ava" style="background:var(--blurple)">'+(e[1].icon||e[1].name[0].toUpperCase())+'</div><div class="info"><div class="name">'+esc(e[1].name)+'</div></div>'+(isM?'<span style="font-size:11px;color:var(--green)">✓</span>':'<button class="btn primary small" data-join="'+e[0]+'">Войти</button>')+'</div>'});modal('Все серверы',html||'<p style="color:var(--muted)">Нет серверов</p>',[{text:'Закрыть',action:'c'}]);setTimeout(function(){document.querySelectorAll('[data-join]').forEach(function(b){b.addEventListener('click',function(){var sid=b.dataset.join;db.ref('servers/'+sid+'/members/'+U.nickname).set(true);openServer(sid);document.querySelector('.modal-overlay')?.remove()})})},200)})});
}

function checkSession(){var s=getS();if(s&&s.nickname){db.ref('users/'+s.nickname).once('value').then(function(dd){if(dd.val())login(s.nickname);else clearS()}).catch(function(){clearS()})}}

bindDom();upAuthUI();bindEvents();checkSession();
})();</script></body></html>
